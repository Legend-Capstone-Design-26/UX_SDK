<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AB Sample - Detail</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="detail">
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <h1>상품 상세</h1>
      </div>

      <div class="badges">
        <div class="badge">Variant: <strong data-role="variant">?</strong></div>
        <a class="btn" data-track-id="go_main" href="/">메인</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="detail-hero">
          <div class="left">
            <div class="name" data-role="product-name">—</div>
            <div class="meta" data-role="product-meta">—</div>
          </div>
          <div class="price" data-role="product-price">—</div>
        </div>

        <div class="hr"></div>

        <p class="sub">
          이 영역은 상세 설명이라고 가정합니다. A/B 실험은 보통
          <strong>CTA 문구/강조/배치</strong>를 바꿔서 퍼널 변화(CVR, 이탈률)를 보는 형태로 시작합니다.
        </p>

        <div class="card" style="padding:12px; margin-top:12px;">
          <h2 style="margin:0 0 6px; font-size:14px;">리뷰 요약(더미)</h2>
          <p class="sub" style="margin:0;">
            “배송 빠름”, “맛/품질 만족”, “재구매 의사 있음” 같은 텍스트가 들어온다고 가정.
          </p>
        </div>
      </div>

      <div class="card">
        <h2>구매 액션</h2>
        <p class="sub">여기 CTA가 실험 대상입니다.</p>

        <div class="detail-actions" data-role="detail-actions">
          <button class="btn"
                  data-track-id="cta_go_detail"
                  type="button"
                  onclick="location.href='/checkout'">
            상품 보러가기
          </button>

          <a class="btn primary"
             data-track-id="buy_btn"
             data-keep-product="1"
             href="/checkout">
            구매하기
          </a>
        </div>

        <div class="hr"></div>

        <div class="notice">
          <span class="pill">A/B</span>
          <div>
            Variant B에서는 구매 버튼 문구가 바뀌고(“지금 구매”), 구매 영역이 더 눈에 띄도록 처리됩니다.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/sdk.js"></script>
<script>
  // SDK 설치
  window.__sdk = MiniSDK.create({
    endpoint: "/collect",
    appId: "ab-sample",
    schemaVersion: 1,
    debug: true
  });
  window.__sdk.install();
</script>
</body>
</html>
